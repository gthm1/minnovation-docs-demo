# Decap CMS config for the Minnovation docs demo.
#
# For local demoing (no GitHub OAuth needed):
#   1. npm run cms        # starts the local git proxy on :8081
#   2. npm start           # starts Docusaurus on :3000
#   3. open http://localhost:3000/admin/
# Edits made in the CMS are written straight to the Markdown files in this repo.
#
# For a real deployment, swap the backend below for "github" (or "git-gateway"
# with Netlify Identity) and remove local_backend — see the walkthrough guide.

backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: "static/img/uploads"
public_folder: "/img/uploads"

collections:
  - name: "public_docs"
    label: "Public Docs"
    description: "Client-facing documentation, visible to anyone."
    files:
      - name: "home"
        label: "Public Docs — Home Page"
        file: "docs/intro.mdx"
        fields:
          - {label: "Sidebar Position", name: "sidebar_position", widget: "number", required: false}
          - {label: "Slug", name: "slug", widget: "string", required: false}
          - {label: "Body", name: "body", widget: "markdown"}
      - name: "alphax_overview"
        label: "AlphaX Cloud Overview"
        file: "docs/getting-started/alphax-overview.md"
        fields:
          - {label: "Sidebar Position", name: "sidebar_position", widget: "number", required: false}
          - {label: "Body", name: "body", widget: "markdown"}
      - name: "conduit_api"
        label: "Conduit API Reference"
        file: "docs/api-reference/conduit-api.md"
        fields:
          - {label: "Sidebar Position", name: "sidebar_position", widget: "number", required: false}
          - {label: "Body", name: "body", widget: "markdown"}
      - name: "xvision_install"
        label: "XVision Installation Guide"
        file: "docs/installation/xvision-install.md"
        fields:
          - {label: "Sidebar Position", name: "sidebar_position", widget: "number", required: false}
          - {label: "Body", name: "body", widget: "markdown"}

  - name: "internal_docs"
    label: "Internal Docs"
    description: "Internal-only documentation. NOT actually access-restricted in this demo — see the walkthrough guide."
    files:
      - name: "home"
        label: "Internal Docs — Home Page"
        file: "internal-docs/intro.md"
        fields:
          - {label: "Sidebar Position", name: "sidebar_position", widget: "number", required: false}
          - {label: "Slug", name: "slug", widget: "string", required: false}
          - {label: "Body", name: "body", widget: "markdown"}
      - name: "system_architecture"
        label: "System Architecture"
        file: "internal-docs/architecture/system-architecture.md"
        fields:
          - {label: "Sidebar Position", name: "sidebar_position", widget: "number", required: false}
          - {label: "Body", name: "body", widget: "markdown"}
      - name: "deployment_runbook"
        label: "Deployment Runbook"
        file: "internal-docs/deployment/deployment-runbook.md"
        fields:
          - {label: "Sidebar Position", name: "sidebar_position", widget: "number", required: false}
          - {label: "Body", name: "body", widget: "markdown"}
