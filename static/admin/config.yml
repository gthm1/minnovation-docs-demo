# Decap CMS config for the Minnovation docs demo.
#
# For local demoing (no GitHub OAuth needed):
#   1. npm run cms        # starts the local git proxy on :8081
#   2. npm start           # starts Docusaurus on :3000
#   3. open http://localhost:3000/admin/
# Edits made in the CMS are written straight to the Markdown files in this repo.
#
# For a real deployment, swap the backend below for "github" (or "git-gateway"
# with Netlify Identity) and remove local_backend — see the walkthrough guide.

backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: "static/img/uploads"
public_folder: "/img/uploads"

collections:
  - name: "docs"
    label: "Docs"
    description: >
      All documentation lives here — the Visibility field on each page decides
      whether it ships on the public site, the internal site, or both.
      (Internal automatically includes everything Public includes.)
    folder: "content/docs"
    create: true
    slug: "{{slug}}"
    extension: "md"
    nested:
      depth: 100
      summary: "{{title}}"
    fields:
      - {label: "Title", name: "title", widget: "string", required: false}
      - label: "Visibility"
        name: "visibility"
        widget: "select"
        options:
          - {label: "Public", value: "public"}
          - {label: "Internal only", value: "internal"}
        default: "public"
        hint: "Public pages show on both sites. Internal pages only show on the internal site."
      - {label: "Sidebar Position", name: "sidebar_position", widget: "number", required: false}
      - {label: "Slug (advanced — leave blank unless you know why)", name: "slug", widget: "string", required: false}
      - {label: "Body", name: "body", widget: "markdown"}
